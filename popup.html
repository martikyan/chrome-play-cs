<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Options</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        width: 260px;
        padding: 15px;
        margin: 0;
        background-color: #1e1e24;
        color: #fff;
      }
      h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 8px;}
      .control-group { margin-bottom: 15px; }
      label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: 500;}
      input[type="range"] { width: 100%; cursor: pointer; }
      input[type="color"] { width: 100%; height: 35px; border: none; padding: 0; cursor: pointer; border-radius: 4px; background: transparent; }
      input[type="text"] { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #444; background: #2a2a32; color: #fff; font-family: monospace; box-sizing: border-box;}
      .value-display { color: #7dcea0; }
      
      .add-btn { width: 100%; padding: 8px; border-radius: 4px; border: none; background: #7dcea0; color: #1e1e24; font-weight: bold; cursor: pointer; margin-top: 5px; margin-bottom: 15px; }
      .add-btn:hover { background: #6ab78f; }

      .binding-row { display: flex; gap: 6px; }
      .del-btn { background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; width: 30px; font-weight: bold; flex-shrink: 0;}
      .del-btn:hover { background: #c0392b; }
    </style>
  </head>
  <body>
    <h3>Display Settings</h3>
    
    <div class="control-group">
      <label>Brightness (%): <span id="brightness-val" class="value-display">100</span></label>
      <input type="range" id="popup-brightness" min="0" max="300" step="1" />
    </div>

    <div class="control-group">
      <label>Contrast (%): <span id="contrast-val" class="value-display">100</span></label>
      <input type="range" id="popup-contrast" min="0" max="300" step="1" />
    </div>

    <div class="control-group">
      <label>Saturation (%): <span id="saturation-val" class="value-display">100</span></label>
      <input type="range" id="popup-saturation" min="0" max="300" step="1" />
    </div>

    <h3>Crosshair Settings</h3>
    
    <div class="control-group">
      <label>Size (px): <span id="size-val" class="value-display">6</span></label>
      <input type="range" id="popup-size" min="1" max="50" step="1" />
    </div>

    <div class="control-group">
      <label>Thickness (px): <span id="thickness-val" class="value-display">1</span></label>
      <input type="range" id="popup-thickness" min="1" max="10" step="1" />
    </div>

    <div class="control-group">
      <label>Color:</label>
      <input type="color" id="popup-color" />
    </div>
    <div class="control-group">
      <label style="display: flex; align-items: center; justify-content: space-between;">
        Double Space Macro:
        <input type="checkbox" id="popup-double-space" style="width: 18px; height: 18px; cursor: pointer;" />
      </label>
    </div>
    <h3>Add Custom Binding</h3>
    <div class="control-group">
      <label>Name:</label>
      <input type="text" id="custom-name" placeholder="e.g., Scout Standard" />
    </div>
    <div class="control-group">
      <label>Sequence (e.g., b43b62):</label>
      <input type="text" id="custom-sequence" placeholder="b43b62" />
    </div>
    <div class="control-group">
      <label>Trigger Key(s) (e.g., ]):</label>
      <input type="text" id="custom-trigger" placeholder="]}" />
    </div>
    <button id="add-binding-btn" class="add-btn">Add Binding</button>

    <h3>Key Bindings</h3>
    <div id="bindings-container"></div>

    <script src="settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
